      border-radius: 8px;

      font-size: 13px;

    .nav button:hover {

    }

    .nav button.active {

      color: #fff;
      border-color: rgba(255, 255, 255, 0.15);

      font-size: 13px;

    .editor textarea {

    }

    .editor input:focus,

    }

    async function exportPNG(activeTemplate, data) {
      try {
        if (typeof html2canvas === 'undefined') {
          alert('Erreur : html2canvas n’est pas chargé.');
          return;
        }

        const exportRoot = document.getElementById('export-root');

        if (!exportRoot) {
          alert('Erreur : conteneur d’export introuvable.');
          return;
        }

        exportRoot.innerHTML = '';

        const exportApp = document.createElement('div');
        exportApp.style.width = '1080px';
        exportApp.style.height = '1080px';
        exportApp.style.overflow = 'hidden';

        exportRoot.appendChild(exportApp);

        const activeTemplateConfig = TEMPLATES.find((template) => template.id === activeTemplate);

        if (!activeTemplateConfig) {
          alert('Erreur : template introuvable.');
          return;
        }

        const exportElement = activeTemplateConfig.render(data);

        const exportReactRoot = ReactDOM.createRoot(exportApp);
        exportReactRoot.render(exportElement);

        await new Promise((resolve) => setTimeout(resolve, 500));

        if (document.fonts && document.fonts.ready) {
          await document.fonts.ready;
        }

        const EXPORT_SCALE = 3;

        const canvas = await html2canvas(exportApp, {
          scale: EXPORT_SCALE,
          backgroundColor: null,
          useCORS: true,
          allowTaint: false,
          logging: false,
          width: 1080,
          height: 1080,
          windowWidth: 1080,
          windowHeight: 1080
        });
        const image = canvas.toDataURL('image/png');

        if (!image || image === 'data:,') {
          alert('Erreur : le PNG généré est vide.');
          return;
        }

        const link = document.createElement('a');
        const timestamp = new Date().toISOString().slice(0, 19).replaceAll(':', '-');

        link.download = `royal-${activeTemplate}-${timestamp}.png`;
        link.href = image;
        link.click();

        exportReactRoot.unmount();
        exportRoot.innerHTML = '';
      } catch (error) {
        console.error('Erreur export PNG :', error);
        alert(`Erreur export PNG : ${error.message}`);
      }
    }

        });
      }

      function addGame() {
        onChange({
          ...data,
          games: [
            ...data.games,
            {
              dayName: 'VEN',
              dayNum: '00',
              month: 'AVR',
              home: 'ROYAL',
              away: 'ADVERSAIRE',
              arena: 'Aréna Jacques-Plante · Shawinigan',
              time: '19 H 00',
              location: 'HOME'
            }
          ]
        });
      }

      function removeGame(index) {
        const games = data.games.filter((_, i) => i !== index);

        onChange({
          ...data,
          games
        });
      }

      function updatePartner(index, field, value) {
        const partners = [...(data.partners || [])];

        partners[index] = {
          ...partners[index],
          [field]: value
        };

        onChange({
          ...data,
          partners
        });
      }

      function addPartner() {
        onChange({
          ...data,
          partners: [
            ...(data.partners || []),
            {
              name: 'Nouveau partenaire',
              logo: '../../assets/logos/sponsors/lps-blanc.png'
            }
          ]
        });
      }

      function removePartner(index) {
        const partners = (data.partners || []).filter((_, i) => i !== index);

        onChange({
          ...data,
          partners
        });
      }

      return (
        <aside className="editor">
          <h2>R04 — Horaire</h2>

          <div className="hint">
            Modifie les données ici. Le visuel se met à jour automatiquement.
          </div>

          <label>Eyebrow</label>
          <input
            value={data.eyebrow}
            onChange={(event) => updateField('eyebrow', event.target.value)}
          />

          <label>Titre</label>
          <textarea
            value={data.title}
            onChange={(event) => updateField('title', event.target.value)}
          />

          <label>Période</label>
          <input
            value={data.range}
            onChange={(event) => updateField('range', event.target.value)}
          />

          <label>Footer gauche</label>
          <input
            value={data.footerLeft}
            onChange={(event) => updateField('footerLeft', event.target.value)}
          />

          <label>Footer droite</label>
          <input
            value={data.footerRight}
            onChange={(event) => updateField('footerRight', event.target.value)}
          />

          <label>Titre partenaires</label>
          <input
            value={data.partnersTitle || ''}
            onChange={(event) => updateField('partnersTitle', event.target.value)}
          />

          <div className="game-block">
            <div className="game-block-head">
              <div className="game-block-title">Logos partenaires</div>
            </div>

            {(data.partners || []).map((partner, index) => (
              <div key={index} style={{ marginBottom: 16 }}>
                <label>Nom partenaire {index + 1}</label>
                <input
                  value={partner.name}
                  onChange={(event) => updatePartner(index, 'name', event.target.value)}
                />

                <label>Logo partenaire {index + 1} — bibliothèque</label>
                <select
                  value={partner.logo && !partner.logo.startsWith('data:') ? partner.logo : ''}
                  onChange={(event) => updatePartner(index, 'logo', event.target.value)}
                >
                  <option value="">— Placeholder (aucun logo) —</option>
                  {ASSET_LOGOS.map((asset) => (
                    <option key={asset.value} value={asset.value}>
                      {asset.label}
                    </option>
                  ))}
                </select>

                <label>Ou télécharger un logo client</label>
                <input
                  type="file"
                  accept="image/png,image/jpeg,image/jpg,image/svg+xml,image/webp"
                  onChange={(event) => {
                    const file = event.target.files && event.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = () => updatePartner(index, 'logo', reader.result);
                    reader.readAsDataURL(file);
                  }}
                />
                {partner.logo && partner.logo.startsWith('data:') && (
                  <button
                    className="btn btn-secondary"
                    type="button"
                    style={{ marginTop: 6 }}
                    onClick={() => updatePartner(index, 'logo', '')}
                  >
                    Retirer le fichier local
                  </button>
                )}

                <button
                  className="btn btn-danger"
                  type="button"
                  style={{ marginTop: 8 }}
                  onClick={() => removePartner(index)}
                >
                  Supprimer ce logo
                </button>
              </div>
            ))}

            <button className="btn btn-secondary" type="button" onClick={addPartner}>
              Ajouter un logo partenaire
            </button>
          </div>

          {(data.games || []).map((game, index) => (
            <div className="game-block" key={index}>
              <div className="game-block-head">
                <div className="game-block-title">Match {index + 1}</div>

                <button
                  className="btn btn-danger"
                  onClick={() => removeGame(index)}
                  type="button"
                >
                  Supprimer
                </button>
              </div>

              <div className="editor-row">
                <div>
                  <label>Jour</label>
                  <input
                    value={game.dayName}
                    onChange={(event) => updateGame(index, 'dayName', event.target.value)}
                  />
                </div>

                <div>
                  <label>Date</label>
                  <input
                    value={game.dayNum}
                    onChange={(event) => updateGame(index, 'dayNum', event.target.value)}
                  />
                </div>
              </div>

              <div className="editor-row">
                <div>
                  <label>Mois</label>
                  <input
                    value={game.month}
                    onChange={(event) => updateGame(index, 'month', event.target.value)}
                  />
                </div>

                <div>
                  <label>Type</label>
                  <select
                    value={game.location}
                    onChange={(event) => updateGame(index, 'location', event.target.value)}
                  >
                    <option value="HOME">Domicile</option>
                    <option value="AWAY">Extérieur</option>
                  </select>
                </div>
              </div>

              <label>Équipe locale</label>
              <input
                value={game.home}
                onChange={(event) => updateGame(index, 'home', event.target.value)}
              />

              <label>Équipe adverse</label>
              <input
                value={game.away}
                onChange={(event) => updateGame(index, 'away', event.target.value)}
              />

              <label>Lieu</label>
              <input
                value={game.arena}
                onChange={(event) => updateGame(index, 'arena', event.target.value)}
              />

              <label>Heure</label>
              <input
                value={game.time}
                onChange={(event) => updateGame(index, 'time', event.target.value)}
              />
            </div>
          ))}

          <ColorsSection
            colors={data.colors}
            onChange={(nextColors) => onChange({ ...data, colors: nextColors })}
          />

          <div className="editor-actions">
            <button className="btn btn-secondary" onClick={addGame} type="button">
              Ajouter un match
            </button>

            <button className="btn btn-primary" onClick={onExport} type="button">
              Télécharger PNG
            </button>

            <button className="btn btn-secondary" onClick={onReset} type="button">
              Réinitialiser R04
            </button>
          </div>
        </aside>
      );
    }

    function App() {
      const [active, setActive] = useState('R04');
      const [scale, setScale] = useState(0.7);
      const [data, setData] = useState(() => deepClone(DEFAULT_DATA));
      const wrapRef = useRef();

      useEffect(() => {
        function fit() {
          if (!wrapRef.current) return;

          const rect = wrapRef.current.getBoundingClientRect();
          const availableWidth = rect.width - 80;
          const availableHeight = rect.height - 80;

          setScale(Math.min(availableWidth / 1080, availableHeight / 1080, 1));
        }

        fit();

        window.addEventListener('resize', fit);

        const resizeObserver = new ResizeObserver(fit);

        if (wrapRef.current) {
          resizeObserver.observe(wrapRef.current);
        }

        return () => {
          window.removeEventListener('resize', fit);
          resizeObserver.disconnect();
        };
      }, []);

      const activeTemplate = TEMPLATES.find((template) => template.id === active);

function resetCurrentTemplate() {
  if (active === 'R02') {
    setData({
      ...data,
      R02: deepClone(DEFAULT_DATA.R02)
    });
  }

  if (active === 'R04') {
    setData({
      ...data,
      R04: deepClone(DEFAULT_DATA.R04)
    });
  }
}
      return (
        <div className="shell">
          <aside className="nav">
            <h1>ROYAL</h1>
            <div className="sub">SOCIAL UI KIT</div>

            <ul>
              {TEMPLATES.map((template) => (
                <li key={template.id}>
                  <button
                    className={template.id === active ? 'active' : ''}
                    onClick={() => setActive(template.id)}
                  >
                    {template.label}
                  </button>
                </li>
              ))}
            </ul>

            <div className="meta">1080 × 1080 · Instagram</div>
          </aside>

          <EditorPanel
            active={active}
            data={data}
            setData={setData}
            onReset={resetCurrentTemplate}
            onExport={() => exportPNG(active, data)}
          />

          <main className="stage-wrap" ref={wrapRef}>
            <div
              className="stage-frame"
              style={{ transform: `translate(-50%, -50%) scale(${scale})` }}
            >
              {activeTemplate.render(data)}
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
