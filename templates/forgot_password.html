{% extends "base.html" %}
{% block title %}Mot de passe oublié{% endblock %}

{% block head %}
<style>
  .auth-page { display:flex; justify-content:center; align-items:center; min-height:60vh; padding:var(--space-6) var(--space-3); }
  .auth-container { width:min(480px,100%); }
  .auth-logo { display:block; margin:0 auto var(--space-4); height:70px; width:auto; }
  .auth-desc { color:#7a7773; margin-bottom:var(--space-4); }
  .auth-link { text-align:center; margin-top:var(--space-3); font-size:var(--fs-sm); }
  .separator { text-align:center; color:#aaa; margin:var(--space-3) 0; font-size:var(--fs-sm); position:relative; }
  .separator::before, .separator::after { content:''; position:absolute; top:50%; width:42%; height:1px; background:var(--couleur-bordure); }
  .separator::before { left:0; } .separator::after { right:0; }
</style>
{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-container card">
    <img src="{{ url_for('static', filename='logo 2.png') }}" alt="Logo Cocktail Média" class="auth-logo">
    <h1 style="text-align:center;font-size:var(--fs-xl);border:none;padding:0;margin-bottom:var(--space-2);">Mot de passe oublié</h1>
    <p class="auth-desc" style="text-align:center;">Entrez votre email et nous vous enverrons un lien de réinitialisation.</p>
    <form method="post" class="form" novalidate>
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label for="email">Adresse email</label>
        <input type="email" id="email" name="email" required>
      </div>
      <button type="submit" class="btn-block">Envoyer le lien</button>
    </form>
    <p class="auth-link"><a href="{{ url_for('accueil') }}">← Retour à la connexion</a></p>
  </div>
</div>
{% endblock %}
