{% extends "base.html" %}
{% block title %}Modifier le projet{% endblock %}

{% block content %}

<nav class="breadcrumbs" aria-label="Fil d'Ariane">
  <a href="{{ url_for('admin_dashboard') }}">Tableau de bord admin</a>
  <span class="sep">›</span>
  <span>Modifier un projet</span>
</nav>

<h1>Modifier le projet</h1>

<div class="card">
  <form method="post" action="" class="form" novalidate>

    <div class="form-row">
      <div class="form-group">
        <label for="nom_projet">Nom du projet</label>
        <input type="text" id="nom_projet" name="nom_projet" value="{{ projet['nom_projet'] }}" required>
      </div>
      <div class="form-group">
        <label for="id_client">Client associé</label>
        <select id="id_client" name="id_client" required>
          {% for c in clients %}
            <option value="{{ c['id'] }}" {{ 'selected' if c['id'] == projet['id_client'] else '' }}>
              {{ c['nom_complet'] }}
            </option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="statut">Statut du projet</label>
        <select id="statut" name="statut" required>
          <option value="Documents à donner"
            {{ 'selected' if (projet['statut']|lower in ['documents à donner','documents a donner','doc a donner','document a donner']) or (not projet['statut']) else '' }}>
            Documents à donner
          </option>
          <option value="Documents reçus"
            {{ 'selected' if projet['statut']|lower in ['documents reçus','documents recus','doc recu','doc reçu'] else '' }}>
            Documents reçus
          </option>
          <option value="Travaux en cours"
            {{ 'selected' if projet['statut']|lower in ['travaux en cours','en cours'] else '' }}>
            Travaux en cours
          </option>
          <option value="Travaux terminés"
            {{ 'selected' if projet['statut']|lower in ['travaux terminés','travaux termines','terminé','termine','terminés','fini'] else '' }}>
            Travaux terminés
          </option>
        </select>
      </div>
      <div class="form-group">
        <label for="lien_gdrive">Lien Google Drive (optionnel)</label>
        <input type="url" id="lien_gdrive" name="lien_gdrive" value="{{ projet['lien_gdrive'] or '' }}" placeholder="https://...">
      </div>
    </div>

    <div style="display:flex;gap:var(--space-3);margin-top:var(--space-2);">
      <button type="submit">Enregistrer</button>
      <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Annuler</a>
    </div>

  </form>
</div>

{% endblock %}
