{% extends "base.html" %}
{% block title %}Réinitialiser le mot de passe{% endblock %}

{% block head %}
<style>
  .auth-page { display:flex; justify-content:center; align-items:center; min-height:60vh; padding:var(--space-6) var(--space-3); }
  .auth-container { width:min(480px,100%); }
  .auth-logo { display:block; margin:0 auto var(--space-4); height:70px; width:auto; }
  .auth-link { text-align:center; margin-top:var(--space-3); font-size:var(--fs-sm); }
</style>
{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-container card">
    <img src="{{ url_for('static', filename='logo 2.png') }}" alt="Logo Cocktail Média" class="auth-logo">
    <h1 style="text-align:center;font-size:var(--fs-xl);border:none;padding:0;margin-bottom:var(--space-4);">Nouveau mot de passe</h1>

    <form method="post" action="{{ url_for('reset_password', token=token) }}" class="form" novalidate>
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label for="password">Nouveau mot de passe</label>
        <input type="password" id="password" name="password"
          pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[!@#$%^&*]).{8,}"
          title="Au moins 8 caractères, une majuscule, une minuscule, un chiffre et un caractère spécial."
          required>
      </div>
      <div class="form-group">
        <label for="password2">Confirmer le mot de passe</label>
        <input type="password" id="password2" name="password2" required>
      </div>
      <div class="show-password-container">
        <input type="checkbox" id="togglePw">
        <label for="togglePw">Afficher les mots de passe</label>
      </div>
      <button type="submit" class="btn-block" style="margin-top:var(--space-3);">Mettre à jour</button>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function () {
  const toggle = document.getElementById('togglePw');
  const p1 = document.getElementById('password');
  const p2 = document.getElementById('password2');
  if (toggle) {
    toggle.addEventListener('change', function () {
      const type = this.checked ? 'text' : 'password';
      p1.type = type;
      p2.type = type;
    });
  }
})();
</script>
{% endblock %}
