{% extends "base.html" %}
{% block title %}Modifier le client{% endblock %}

{% block content %}

<nav class="breadcrumbs" aria-label="Fil d'Ariane">
  <a href="{{ url_for('admin_dashboard') }}">Tableau de bord admin</a>
  <span class="sep">›</span>
  <span>Modifier un client</span>
</nav>

<h1>Modifier le client</h1>

<div class="card">
  <form method="post" action="{{ url_for('edit_client', client_id=client['id']) }}" class="form" novalidate>

    <div class="form-row">
      <div class="form-group">
        <label for="nom_complet">Nom complet</label>
        <input type="text" id="nom_complet" name="nom_complet" value="{{ client['nom_complet'] }}" required>
      </div>
      <div class="form-group">
        <label for="nom_entreprise">Entreprise (optionnel)</label>
        <input type="text" id="nom_entreprise" name="nom_entreprise" value="{{ client['nom_entreprise'] or '' }}">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{ client['email'] }}" required>
      </div>
      <div class="form-group">
        <label for="telephone">Téléphone (optionnel)</label>
        <input type="text" id="telephone" name="telephone" value="{{ client['telephone'] or '' }}">
      </div>
    </div>

    <div style="display:flex;gap:var(--space-3);margin-top:var(--space-2);">
      <button type="submit">Enregistrer les modifications</button>
      <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Annuler</a>
    </div>

  </form>
</div>

{% endblock %}
